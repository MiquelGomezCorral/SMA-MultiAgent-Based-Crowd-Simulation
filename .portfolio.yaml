title:
  en: Multi-Agent Based Crowd Evacuation Simulation
  es: Simulación de Evacuación de Multitudes Basada en Sistemas Multi-Agente
finished: finished
descriptionShort:
  en: Crowd evacuation simulation with heterogeneous agents (polite, aggressive, slow) using the Mesa framework. Explores scenarios (corridor, mall, theater, snake) with A*/BFS/Manhattan pathfinding. Analyzes impact of density, agent types, exit count, and exit preference on evacuation times and flow dynamics.
  es: Simulación de evacuación con agentes heterogéneos (educados, agresivos, lentos) usando el framework Mesa. Explora escenarios (pasillo, centro comercial, teatro, serpentín) con pathfinding A*/BFS/Manhattan. Analiza impacto de densidad, tipos de agente, número de salidas y preferencia de salida sobre tiempos de evacuación y dinámicas de flujo.
descriptionLong:
  en: |
    Multi-agent crowd evacuation simulation built on Mesa (Python agent-based modeling framework). Defines 3 agent types with distinct behaviors: polite (yield, crowd-sensitive), aggressive (push, low deadlock sensitivity), and slow (reduced speed, high density sensitivity). The environment uses a discrete grid (OrthogonalMooreGrid) with 6 scenarios: OPEN, MALL, CORRIDOR, SEATS (theater seats), SNAKE (winding path), and RANDOM. Agents use configurable pathfinding (Manhattan, BFS, A*) to navigate toward exits. Detailed metrics are collected: evacuation rate, macro/micro speed, local density, deadlock factor — both per agent type and globally. Massive batch experiments (1000 runs per config, 16 parallel processes) analyze 7 dimensions: agent density, aggressive impact, slow agent impact, pathfinding algorithms, exit preference, number of exits, and exit width. Includes interactive Jupyter widget visualization and a LaTeX paper.
  es: |
    Simulación multi-agente para evacuación de multitudes implementada sobre Mesa (Python agent-based modeling). Define tres tipos de agente con comportamientos distintos: educados (ceden paso, sensibles al hacinamiento), agresivos (empujan, menor sensibilidad al bloqueo) y lentos (velocidad reducida, muy sensibles a la densidad). El entorno es una cuadrícula discreta (OrthogonalMooreGrid) con 6 escenarios: OPEN, MALL, CORRIDOR, SEATS (butacas de teatro), SNAKE (camino serpenteante) y RANDOM. Los agentes usan pathfinding configurable (Manhattan, BFS, A*) para dirigirse a las salidas. Se recolectan métricas detalladas: tasa de evacuación, velocidad macro/micro, densidad local, factor de deadlock, por tipo de agente y globales. Los experimentos masivos (1000 ejecuciones por configuración, 16 procesos en paralelo) analizan 7 dimensiones: densidad de agentes, impacto de agresivos, impacto de lentos, algoritmos de pathfinding, preferencia de salida, número de salidas y anchura de salida. Incluye visualización interactiva con Jupyter widgets y paper en LaTeX.
